theme = "space_carbon"

[editor]
rainbow-brackets = true
rulers = [80, 100]
mouse = true
cursorline = true
continue-comments = true
bufferline = "multiple"
color-modes = true
end-of-line-diagnostics = "hint"
popup-border = "all"
scrolloff = 5
text-width = 100
trim-trailing-whitespace = true

[editor.soft-wrap]
enable = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.cursor-shape]
insert = "underline"
select = "bar"

[editor.file-picker]
hidden = false
ignore = true

[editor.search]
smart-case = true
wrap-around = true

[editor.smart-tab]
enable = true

[editor.auto-save]
focus-lost = true

[editor.whitespace]
render = "all"
[editor.whitespace.characters]
tab = ">"
space = " "
newline = " "

[editor.indent-guides]
render = true

[editor.inline-diagnostics]
cursor-line = "error"
other-lines = "warning"

[editor.statusline]
left = ["mode", "spacer", "version-control", "spacer", "file-name", "read-only-indicator"]
center = ["diagnostics", "spinner", "file-modification-indicator"]
right = ["primary-selection-length", "selections", "register", "position", "separator", "total-line-numbers"]
